---
aid: aarhus
name: Aarhus University
description: >-
  Aarhus University (Aarhus Universitet) is a public research university in
  Aarhus, Denmark, founded in 1928 and ranked #144 in the QS World University
  Rankings 2025. It does not operate a unified, public developer portal. Its
  most concrete machine-readable footprint is the Pure research information
  portal (pure.au.dk), which exposes a Pure web-service / REST API (gated, it
  returns HTTP 401 without credentials) and an OAI-PMH metadata service for
  research outputs. Student-facing systems (mitstudie.au.dk / STADS course
  catalog, timetables with iCal export) are web and feed based rather than
  documented open APIs, and most code activity lives in departmental GitHub
  organizations such as cs-au-dk rather than a central program.
